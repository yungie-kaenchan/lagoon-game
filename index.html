<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Lagoon Island Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a2463 0%, #1565c0 40%, #0d47a1 70%, #0a2463 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: white;
  }
  .container { max-width: 640px; width: 100%; }
  .card {
    background: rgba(255,255,255,0.95);
    color: #333;
    border-radius: 28px;
    padding: 36px 32px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.3);
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop {
    from { transform: translateY(30px) scale(.95); opacity: 0; }
    to   { transform: none; opacity: 1; }
  }
  .art { font-size: 4rem; text-align: center; margin-bottom: 8px; }
  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.9rem;
    color: #0a2463;
    text-align: center;
    margin-bottom: 4px;
  }
  .sub { text-align: center; color: #546e7a; margin-bottom: 24px; }

  .loading { text-align: center; padding: 20px; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(21,101,192,0.2);
    border-top-color: #1565c0;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .alert {
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border: 2px solid;
  }
  .alert-warning { background: #fff3e0; border-color: #ff9800; color: #e65100; }
  .alert-error { background: #ffebee; border-color: #c62828; color: #b71c1c; }
  .alert-info { background: #e3f2fd; border-color: #1565c0; color: #0d47a1; }
  .alert h3 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alert p { font-size: .95rem; line-height: 1.5; }
  .alert ol, .alert ul { margin: 8px 0 0 22px; font-size: .9rem; line-height: 1.7; }
  .alert code {
    background: rgba(0,0,0,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: .85rem;
    font-family: 'Monaco', 'Menlo', monospace;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
  }
  .btn {
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: 1rem;
    padding: 12px 26px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: white;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary { background: linear-gradient(135deg, #1565c0, #0a2463); box-shadow: 0 5px 18px rgba(21,101,192,.4); }
  .btn-success { background: linear-gradient(135deg, #00c853, #00897b); box-shadow: 0 5px 18px rgba(0,200,83,.35); }
  .btn-coral { background: linear-gradient(135deg, #ff6f61, #e53935); box-shadow: 0 5px 18px rgba(255,111,97,.4); }
  .btn-outline {
    background: transparent;
    color: #546e7a;
    border: 2px solid #cfd8dc;
  }

  .pre-block {
    background: #263238;
    color: #b3e5fc;
    padding: 12px 16px;
    border-radius: 10px;
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: .85rem;
    overflow-x: auto;
    margin-top: 8px;
    white-space: pre;
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="art">&#127754;</div>
    <h1>Thai Lagoon Island Adventure</h1>
    <div class="sub">And the 3 Ancient Orbs</div>

    <div id="status"><div class="loading"><div class="spinner"></div><div>Checking environment...</div></div></div>
  </div>
</div>

<script>
  // ── Environment Diagnostic (no ES modules, plain JS) ──
  (function() {
    const statusEl = document.getElementById('status');

    // 1. Check protocol
    const isFileProtocol = window.location.protocol === 'file:';

    // 2. Check Firebase config (fetch the config file and inspect)
    function checkFirebaseConfig() {
      return fetch('./js/firebase-config.js')
        .then(r => r.text())
        .then(text => {
          if (text.indexOf('YOUR_API_KEY') !== -1 || text.indexOf('YOUR_PROJECT_ID') !== -1) {
            return { configured: false };
          }
          return { configured: true };
        })
        .catch(() => ({ configured: false, fetchError: true }));
    }

    // Render diagnostics
    if (isFileProtocol) {
      statusEl.innerHTML = `
        <div class="alert alert-error">
          <h3>&#9888;&#65039; Cannot run from file://</h3>
          <p>You opened this file directly (double-clicked). Modern web apps with ES modules and Firebase SDK need a web server — they won't work from <code>file://</code> URLs.</p>
        </div>
        <div class="alert alert-info">
          <h3>&#128161; Quick fix: Start a local server</h3>
          <p>Open Terminal in the project folder and run <strong>one</strong> of these commands:</p>
          <div class="pre-block">npx serve .</div>
          <div class="pre-block">python3 -m http.server 8000</div>
          <p style="margin-top:10px;">Then open <code>http://localhost:8000</code> (or the URL the command prints) in your browser.</p>
        </div>
        <div class="alert alert-warning">
          <h3>&#127918; Want to see the game right now?</h3>
          <p>You can still try the original standalone voice-game (no login, no saving) if you have the image files in place:</p>
          <div class="btn-row">
            <a href="demo.html" class="btn btn-coral">&#128293; Try Demo Game (no login)</a>
          </div>
        </div>`;
      return;
    }

    // On http:// or https:// - check Firebase
    checkFirebaseConfig().then(result => {
      if (!result.configured) {
        statusEl.innerHTML = `
          <div class="alert alert-warning">
            <h3>&#9881;&#65039; Firebase not configured yet</h3>
            <p>Before students or teachers can log in, you need to connect the app to Firebase. This powers authentication, real-time scoreboards, and data persistence.</p>
          </div>
          <div class="alert alert-info">
            <h3>&#128221; Setup steps</h3>
            <ol>
              <li>Open <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a> and create a new project</li>
              <li>Add a Web App (<code>&lt;/&gt;</code> icon), copy the <code>firebaseConfig</code></li>
              <li>Open <code>js/firebase-config.js</code> and replace the <code>YOUR_*</code> placeholders</li>
              <li>In Firebase Console: enable <strong>Authentication &rarr; Email/Password</strong></li>
              <li>Create a <strong>Firestore</strong> database (test mode is fine to start)</li>
              <li>Create your first teacher account (see <code>SETUP.md</code> for details)</li>
            </ol>
            <p style="margin-top:12px;">Full guide is in <code>SETUP.md</code>.</p>
          </div>
          <div class="btn-row">
            <a href="demo.html" class="btn btn-coral">&#128293; Try Demo Game</a>
            <a href="login.html" class="btn btn-primary">&#128273; Go to Login (needs Firebase)</a>
          </div>`;
        return;
      }

      // Firebase seems configured - load the auth module and redirect
      statusEl.innerHTML = `<div class="loading"><div class="spinner"></div><div>Signing you in...</div></div>`;

      // Dynamic import so module loading errors don't kill the whole page
      import('./js/auth.js').then(({ getCurrentUser }) => {
        return getCurrentUser();
      }).then(user => {
        if (user) {
          if (user.role === 'teacher') window.location.replace('teacher/dashboard.html');
          else window.location.replace('student/dashboard.html');
        } else {
          window.location.replace('login.html');
        }
      }).catch(err => {
        console.error(err);
        statusEl.innerHTML = `
          <div class="alert alert-error">
            <h3>&#10060; Firebase connection failed</h3>
            <p>Your credentials in <code>js/firebase-config.js</code> may be incorrect, or the required services aren't enabled yet.</p>
            <p style="margin-top:8px;"><strong>Error:</strong> ${String(err.message || err)}</p>
          </div>
          <div class="btn-row">
            <a href="login.html" class="btn btn-primary">Continue to Login</a>
            <a href="demo.html" class="btn btn-coral">&#128293; Try Demo Game</a>
          </div>`;
      });
    });
  })();
</script>
</body>
</html>
